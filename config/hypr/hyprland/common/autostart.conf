exec-once = hyprlock 
exec-once = systemctl --user enable --now hyprpolkitagent.service

exec-once = sleep 1 && uwsm-app -- hypridle
exec-once = sleep 1 && uwsm-app -- waybar -c ~/.config/waybar/hyprland.jsonc
exec-once = sleep 1 && uwsm-app -- mako
exec-once = sleep 1 && uwsm-app -- hyprpaper
exec-once = sleep 1 && uwsm-app -- swayosd-server
exec-once = sleep 1 && uwsm-app -- foot --server
exec-once = sleep 1 && hyprctl keyword cursor:invisible false
