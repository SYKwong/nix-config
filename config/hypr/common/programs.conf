# See https://wiki.hyprland.org/Configuring/Keywords/
$terminal = kitty
$fileManager = yazi
$menu = rofi -show drun
$reload_waybar = pkill waybar; waybar &
$snip = grim -g "$(slurp -o -r -c '##ff0000ff')" -t ppm - | satty --filename - --fullscreen --output-filename ~/Pictures/Screenshots/$(date '+%Y%m%d-%H:%M:%S').png

