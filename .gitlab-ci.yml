stages:
  - test
  - maintenance

verify-flake:
  stage: test
  image: nixos/nix:latest
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - nix flake check --extra-experimental-features "nix-command flakes"

update-flake-mr:
  stage: maintenance
  image: nixos/nix:latest
  rules:
    - if: $RUN_FLAKE_UPDATE == "true"
  before_script:
    - git config --global user.email "ci-bot@gitlab.com"
    - git config --global user.name "Nix Update Bot"
    - git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
  script:
    # 1. Create a unique branch name
    - BRANCH_NAME="flake-update-$(date +%Y-%m-%d)"
    - git checkout -b "$BRANCH_NAME"
    
    # 2. Run the update
    - nix --experimental-features "nix-command flakes" flake update 2> update_summary.txt
    
    # 3. Check for changes and push
    - |
      if git diff --exit-code flake.lock; then
        echo "No updates available."
      else
        RAW_LINES=$(grep '•' update_summary.txt)
        SUMMARY="${RAW_LINES//•/*}"
        SUMMARY="${SUMMARY//$'\n'/\\n}"
        SUMMARY="${SUMMARY//:/ }"

        git add flake.lock
        git commit -m "chore: nix flake update"
        
        if [ "$DRY_RUN" == "true" ]; then
          echo "DRY RUN: Would have pushed and created an MR now."
          echo "$SUMMARY"
        else
          # 4. Push with MR creation options
         git push -f origin "$BRANCH_NAME" \
            -o merge_request.create \
            -o merge_request.target="$CI_DEFAULT_BRANCH" \
            -o merge_request.title="Daily Nix Flake Update: $(date +%Y-%m-%d)" \
            -o merge_request.description="The following flake inputs were updated: $SUMMARY" \

            -o merge_request.remove_source_branch \
            -o merge_request.label="dependencies" \
            -o merge_request.assignee_id="$GITLAB_USER_ID" \
            -o merge_request.squash=true \
            -o merge_request.merge_when_pipeline_succeeds
        fi
      fi
